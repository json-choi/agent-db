name: ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.26.1 --activate

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            src-tauri -> src-tauri/target

      - name: Install app dependencies
        run: pnpm install --frozen-lockfile

      - name: Install site dependencies
        run: pnpm --dir site install --frozen-lockfile

      - name: Build desktop frontend
        run: pnpm build

      - name: Build landing site
        run: pnpm site:build

      - name: Stage MCP bridge sidecar
        run: pnpm build:bridge

      - name: Check Rust workspace
        run: cargo check --workspace
