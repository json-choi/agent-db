name: ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.26.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            site/pnpm-lock.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            src-tauri -> src-tauri/target

      - name: Install app dependencies
        run: pnpm install --frozen-lockfile

      - name: Install site dependencies
        run: pnpm --dir site install --frozen-lockfile

      - name: Build desktop frontend
        run: pnpm build

      - name: Test desktop frontend
        run: pnpm test

      - name: Build landing site
        run: pnpm site:build

      - name: Stage MCP bridge sidecar
        run: pnpm build:bridge

      - name: Check Rust workspace
        run: cargo check --workspace

      - name: Lint Rust workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test Rust workspace
        run: cargo test --workspace

  windows-check:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.26.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            src-tauri -> src-tauri/target

      - name: Install app dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop frontend
        run: pnpm build

      - name: Test desktop frontend
        run: pnpm test

      - name: Stage Windows MCP bridge sidecar
        run: pnpm build:bridge

      - name: Check Rust workspace
        run: cargo check --workspace

      - name: Lint Rust workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test Rust workspace
        run: cargo test --workspace
