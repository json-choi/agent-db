name: release

on:
  push:
    tags:
      - "app-v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify owner, version, and main ancestry
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$GITHUB_ACTOR" != "json-choi" ]]; then
            echo "Only @json-choi may start a stable release." >&2
            exit 1
          fi

          tag_version="${GITHUB_REF_NAME#app-v}"
          package_version="$(node -p "require('./package.json').version")"
          tauri_version="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          cargo_version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' src-tauri/Cargo.toml | head -n 1)"
          lock_version="$(awk '$0 == "name = \"dopedb\"" { getline; sub(/^version = \"/, ""); sub(/\"$/, ""); print; exit }' Cargo.lock)"

          for version in "$package_version" "$tauri_version" "$cargo_version" "$lock_version"; do
            if [[ "$version" != "$tag_version" ]]; then
              echo "Tag version $tag_version does not match all version sources." >&2
              exit 1
            fi
          done

          git fetch origin main
          tag_commit="$(git rev-list -n 1 "$GITHUB_REF")"
          if ! git merge-base --is-ancestor "$tag_commit" origin/main; then
            echo "Stable releases must point to a commit already merged into main." >&2
            exit 1
          fi

  publish-tauri:
    needs: verify-release
    permissions:
      contents: write
    timeout-minutes: 60
    environment:
      name: stable-release
      url: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15
            target: aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-15
            target: x86_64-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            rust-targets: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --config src-tauri/tauri.windows.conf.json
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.26.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            src-tauri -> src-tauri/target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload Tauri release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: dopedb v__VERSION__
          releaseBody: |
            Download the macOS or Windows installer from the assets below.

            The Tauri updater uses `latest.json` from this release to detect and install signed updates.
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          args: ${{ matrix.args }}

      - name: Upload stable direct-download asset
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          version="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          tag="${GITHUB_REF_NAME}"

          mkdir -p release-alias
          case "$TARGET" in
            x86_64-pc-windows-msvc)
              pattern="DopeDB_*_x64-setup.exe"
              alias="DopeDB-windows-x64-setup.exe"
              ;;
            aarch64-apple-darwin)
              pattern="DopeDB_*_aarch64.dmg"
              alias="DopeDB-macos-arm64.dmg"
              ;;
            x86_64-apple-darwin)
              pattern="DopeDB_*_x64.dmg"
              alias="DopeDB-macos-x64.dmg"
              ;;
            *)
              echo "No stable alias configured for $TARGET"
              exit 0
              ;;
          esac

          gh release download "$tag" --pattern "$pattern" --dir release-alias
          src="$(find release-alias -maxdepth 1 -type f -name "$pattern" | head -n 1)"
          if [[ -z "${src:-}" || ! -f "$src" ]]; then
            echo "No release asset matching $pattern found for $TARGET" >&2
            exit 1
          fi

          cp "$src" "release-alias/$alias"
          gh release upload "$tag" "release-alias/$alias" --clobber

  finalize-release:
    needs: publish-tauri
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Publish the completed immutable release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false --latest
