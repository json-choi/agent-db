name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "app-v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-tauri:
    permissions:
      contents: write
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15
            target: aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-15
            target: x86_64-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            rust-targets: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --config src-tauri/tauri.windows.conf.json
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.26.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            src-tauri -> src-tauri/target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload Tauri release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'app-v__VERSION__' }}
          releaseName: dopedb v__VERSION__
          releaseBody: |
            Download the macOS or Windows installer from the assets below.

            The Tauri updater uses `latest.json` from this release to detect and install signed updates.
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          args: ${{ matrix.args }}

      - name: Upload stable direct-download asset
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          version="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF_TYPE:-}" != "tag" ]]; then
            tag="app-v${version}"
          fi

          mkdir -p release-alias
          case "$TARGET" in
            x86_64-pc-windows-msvc)
              pattern="DopeDB_*_x64-setup.exe"
              alias="DopeDB-windows-x64-setup.exe"
              ;;
            aarch64-apple-darwin)
              pattern="DopeDB_*_aarch64.dmg"
              alias="DopeDB-macos-arm64.dmg"
              ;;
            x86_64-apple-darwin)
              pattern="DopeDB_*_x64.dmg"
              alias="DopeDB-macos-x64.dmg"
              ;;
            *)
              echo "No stable alias configured for $TARGET"
              exit 0
              ;;
          esac

          gh release download "$tag" --pattern "$pattern" --dir release-alias
          src="$(find release-alias -maxdepth 1 -type f -name "$pattern" | head -n 1)"
          if [[ -z "${src:-}" || ! -f "$src" ]]; then
            echo "No release asset matching $pattern found for $TARGET" >&2
            exit 1
          fi

          cp "$src" "release-alias/$alias"
          gh release upload "$tag" "release-alias/$alias" --clobber
